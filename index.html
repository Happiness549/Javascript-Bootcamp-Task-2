<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Grading Scale</title>
</head>
<body>

    <section>
        <h1>Student's Marks</h1>

        <form action="" id="form">
            <label for="name">Student's Name</label>
            <input type="text" id="name" name="name" placeholder="Enter student's name">
            <label for="marks">Student's Mark</label>
            <input type="text" id="mark" name="mark" placeholder="Enter student's mark">
            
        </form>

        <button type="submit" id='button'>Submit</button>
    </section>
</body>
</html>
