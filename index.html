<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Grading Scale</title>
</head>
<body>

    <section>
        <h1>Student's Marks</h1>

        <form action="" id="form">
            <label for="name">Student's Name</label>
            <input type="text" id="student-name" name="name" placeholder="Enter student's name">
            <label for="marks">Student's Mark</label>
            <input type="number" id="student-mark" name="mark" placeholder="Enter student's mark">
            
             <button type="submit" id='submit-button'>Submit</button>
        </form>

        <div id="results"></div>
        <ul id="student-list">
        </ul>

       
    </section>

    <script src="script.js"></script>
</body>
</html>
